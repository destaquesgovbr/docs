    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

      setStatus('Error: missing bundle data');

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const reader = ds.readable.getReader();

            while (true) {

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"UTF-8\">\n<title>DestaquesGovBr × SECOM<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>/* ============================================================\n   DestaquesGovBr × SECOM — Deck stylesheet (rebuild)\n   6 slides · 1280×720 · paleta oficial gov.br\n   Fontes do sistema (sem fontes remotas). Sem frameworks.\n   ============================================================ */\n\n:root {\n  /* paleta gov.br */\n  --azul-gov:    #1351B4;\n  --azul-claro:  #5A8DE0;   /* azul para fundos escuros */\n  --verde-gov:   #168821;\n  --verde-claro: #2BB13C;\n  --amarelo-gov: #FFCD07;\n  --navy-dark:   #0A1628;\n  --navy-mid:    #0D3B8E;\n  --bg-light:    #F4F6FB;\n  --text-main:   #1A1A2E;\n  --text-muted:  #5A6B8A;\n  --white:       #FFFFFF;\n  --line:        #DBE2EE;\n  --line-strong: #C2CCDD;\n  --card:        #FFFFFF;\n  --subtle:      #EEF2F9;\n\n  /* tipografia */\n  --font-sans: -apple-system, \"Segoe UI\", system-ui, \"Helvetica Neue\", Roboto, sans-serif;\n  --font-mono: \"SF Mono\", \"Cascadia Code\", \"Roboto Mono\", ui-monospace, Consolas, monospace;\n\n  /* densidade (ajustável) */\n  --gap: 20px;\n  --pad: 22px;\n\n  --shadow-sm: 0 1px 2px rgba(13,30,70,0.06), 0 1px 3px rgba(13,30,70,0.05);\n  --shadow-md: 0 6px 18px rgba(13,30,70,0.10);\n  --shadow-lg: 0 18px 48px rgba(8,18,44,0.30);\n}\n\n:root[data-density=\"compact\"] { --gap: 14px; --pad: 16px; }\n:root[data-density=\"comfy\"]   { --gap: 28px; --pad: 30px; }\n\ndeck-stage:not(:defined) { visibility: hidden; }\nhtml, body { margin: 0; background: #05080f; }\nbody { font-family: var(--font-sans); }\n\n/* ---------------- slide frame ---------------- */\n.slide {\n  width: 100%;\n  height: 100%;\n  background: var(--bg-light);\n  color: var(--text-main);\n  font-size: 16px;\n  line-height: 1.55;\n  padding: 50px 64px 58px;\n  display: flex;\n  flex-direction: column;\n  position: relative;\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n.slide * { box-sizing: border-box; }\n.slide h1, .slide h2, .slide h3, .slide h4 { margin: 0; font-weight: 700; }\n.slide p { margin: 0; }\n.slide ul { list-style: none; margin: 0; padding: 0; }\n.slide.white { background: var(--white); }\n.slide.dark  { background: var(--navy-dark); color: var(--white); }\n\n/* ---------------- shared atoms ---------------- */\n.section-tag {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--azul-gov);\n  display: inline-flex;\n  align-items: center;\n  gap: 9px;\n}\n.section-tag::before {\n  content: \"\";\n  width: 22px; height: 2px; background: var(--azul-gov); display: inline-block;\n}\n.dark .section-tag { color: var(--azul-claro); }\n.dark .section-tag::before { background: var(--azul-claro); }\n\n.headline {\n  font-size: 32px;\n  font-weight: 700;\n  line-height: 1.14;\n  letter-spacing: -0.018em;\n  max-width: 24ch;\n  text-wrap: balance;\n}\n.headline .hl { color: var(--azul-gov); }\n.dark .headline .hl { color: var(--azul-claro); }\n.slide-head { display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; }\n.slide-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }\n\n/* flag tick */\n.flagtick { display: inline-flex; gap: 4px; height: 5px; width: 64px; }\n.flagtick > span { flex: 1; border-radius: 1px; }\n.flagtick > span:nth-child(1){ background: var(--verde-gov); }\n.flagtick > span:nth-child(2){ background: var(--amarelo-gov); }\n.flagtick > span:nth-child(3){ background: var(--azul-gov); }\n\n/* icon bubble */\n.ibub {\n  flex-shrink: 0; width: 42px; height: 42px;\n  display: grid; place-items: center; border-radius: 9px;\n  background: rgba(19,81,180,0.10); color: var(--azul-gov);\n}\n.ibub svg { width: 22px; height: 22px; }\n.ibub.green { background: rgba(22,136,33,0.11); color: var(--verde-gov); }\n.ibub.amber { background: rgba(255,205,7,0.20); color: #8A6D00; }\n\n/* badge / pill */\n.badge {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--font-mono); font-size: 12px; font-weight: 500;\n  letter-spacing: 0.06em; text-transform: uppercase;\n  padding: 6px 12px; border-radius: 999px;\n  background: rgba(19,81,180,0.08); color: var(--azul-gov);\n  border: 1px solid rgba(19,81,180,0.20);\n  white-space: nowrap;\n}\n.badge.os { background: transparent; border-color: rgba(255,255,255,0.22); color: rgba(255,255,255,0.78); }\n.badge.live {\n  background: rgba(22,136,33,0.14); color: var(--verde-claro);\n  border-color: rgba(43,177,60,0.35);\n}\n.badge.live .dot {\n  width: 8px; height: 8px; border-radius: 50%; background: var(--verde-claro);\n  box-shadow: 0 0 0 0 rgba(43,177,60,0.6); animation: livepulse 2s infinite;\n}\n@keyframes livepulse {\n  0% { box-shadow: 0 0 0 0 rgba(43,177,60,0.5); }\n  70% { box-shadow: 0 0 0 7px rgba(43,177,60,0); }\n  100% { box-shadow: 0 0 0 0 rgba(43,177,60,0); }\n}\n\n/* card */\n.card {\n  background: var(--card); border: 1px solid var(--line);\n  border-radius: 12px; box-shadow: var(--shadow-sm);\n}\n\n/* footer (stamped) */\n.deck-foot {\n  position: absolute; left: 64px; right: 64px; bottom: 22px;\n  display: flex; align-items: center; justify-content: space-between;\n  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.05em;\n  color: var(--text-muted);\n}\n.deck-foot .fl { display: inline-flex; align-items: center; gap: 9px; }\n.deck-foot .fl b { color: var(--text-main); font-weight: 600; letter-spacing: 0.02em; }\n.deck-foot .fnum b { color: var(--azul-gov); }\n.dark .deck-foot { color: rgba(255,255,255,0.45); }\n.dark .deck-foot .fl b { color: rgba(255,255,255,0.85); }\n.dark .deck-foot .fnum b { color: var(--azul-claro); }\n.foot-mark { width: 16px; height: 16px; flex-shrink: 0; }\n\n/* fade-in on active */\n@media (prefers-reduced-motion: no-preference) {\n  [data-deck-active] .fade { animation: fadeUp 0.55s cubic-bezier(.2,.7,.3,1) both; }\n  [data-deck-active] .fade.d1 { animation-delay: 0.06s; }\n  [data-deck-active] .fade.d2 { animation-delay: 0.13s; }\n  [data-deck-active] .fade.d3 { animation-delay: 0.20s; }\n  [data-deck-active] .fade.d4 { animation-delay: 0.27s; }\n}\n@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }\n\n/* ============================================================\n   SLIDE 1 — CAPA\n   ============================================================ */\n.cover { padding: 0; flex-direction: row; }\n.cover-left {\n  flex: 0 0 46%; padding: 58px 48px 58px 64px;\n  display: flex; flex-direction: column; gap: 26px;\n  position: relative; z-index: 2;\n}\n.cover-eyebrow {\n  font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: var(--azul-claro);\n}\n.brandmark { display: flex; align-items: center; gap: 13px; }\n.brandmark .bm { width: 46px; height: 46px; flex-shrink: 0; }\n.brandmark .bt { font-size: 15px; letter-spacing: 0.04em; color: rgba(255,255,255,0.65); }\n.cover-title {\n  font-size: 50px; font-weight: 800; line-height: 1.02; letter-spacing: -0.03em;\n  color: var(--white);\n}\n.cover-lede {\n  font-size: 20px; line-height: 1.32; font-weight: 500;\n  color: rgba(255,255,255,0.92); max-width: 19ch; text-wrap: balance;\n}\n.cover-lede .hl { color: var(--azul-claro); }\n.cover-sub {\n  font-size: 15px; line-height: 1.5; color: rgba(255,255,255,0.62);\n  max-width: 30ch;\n}\n.cover-foot { margin-top: auto; display: flex; align-items: center; gap: 12px; }\n\n.cover-right {\n  flex: 1; position: relative; overflow: hidden;\n  background:\n    radial-gradient(circle at 62% 46%, rgba(19,81,180,0.32) 0%, rgba(10,22,40,0) 55%),\n    var(--navy-dark);\n}\n.cover-right::before {\n  content: \"\"; position: absolute; inset: 0;\n  background-image: radial-gradient(rgba(90,141,224,0.16) 1px, transparent 1px);\n  background-size: 26px 26px; opacity: 0.6;\n}\n.netdiagram { position: absolute; inset: 0; width: 100%; height: 100%; }\n\n/* network nodes */\n.net-node circle { fill: var(--navy-mid); stroke: var(--azul-claro); stroke-width: 1.4; }\n.net-node text { fill: rgba(255,255,255,0.78); font-family: var(--font-mono); font-size: 11px; text-anchor: middle; }\n.net-node .glyph { stroke: var(--azul-claro); stroke-width: 1.4; fill: none; }\n.net-node { animation: nodebreathe 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }\n\n.net-core circle.core-bg { fill: var(--azul-gov); }\n.net-core circle.core-aura { fill: none; stroke: var(--azul-claro); stroke-width: 1.2; opacity: 0.5; }\n.net-core text { fill: #fff; font-family: var(--font-sans); font-weight: 800; text-anchor: middle; }\n\n.flow-base { stroke: rgba(90,141,224,0.16); stroke-width: 1.2; fill: none; }\n.flow-dash {\n  stroke: var(--azul-claro); stroke-width: 1.8; fill: none;\n  stroke-linecap: round; stroke-dasharray: 5 90;\n  filter: drop-shadow(0 0 3px rgba(90,141,224,0.7));\n}\n@media (prefers-reduced-motion: no-preference) {\n  [data-deck-active] .flow-dash { animation: flow 2.6s linear infinite; }\n  .net-aura-ring { animation: coreRing 3.4s ease-out infinite; }\n}\n@keyframes flow { from { stroke-dashoffset: 95; } to { stroke-dashoffset: 0; } }\n@keyframes nodebreathe { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }\n@keyframes coreRing {\n  0% { r: 46; opacity: 0.55; } 100% { r: 96; opacity: 0; }\n}\n\n.core-counter {\n  position: absolute; left: 50%; top: calc(50% + 70px); transform: translateX(-50%);\n  text-align: center; z-index: 3;\n}\n.core-counter .cnum {\n  font-family: var(--font-mono); font-size: 26px; font-weight: 600; color: #fff;\n  letter-spacing: 0.01em;\n}\n.core-counter .clbl {\n  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em;\n  text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 2px;\n}\n.latency-badge {\n  position: absolute; left: 50%; top: calc(50% - 92px); transform: translateX(-50%);\n  display: inline-flex; align-items: center; gap: 7px; z-index: 3;\n  font-family: var(--font-mono); font-size: 12px; font-weight: 500;\n  color: var(--verde-claro); background: rgba(10,22,40,0.85);\n  border: 1px solid rgba(43,177,60,0.4); padding: 5px 11px; border-radius: 999px;\n  white-space: nowrap;\n}\n.latency-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--verde-claro); }\n\n/* ============================================================\n   SLIDE 2 — ACERVO (stats + pipeline)\n   ============================================================ */\n.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: var(--gap); }\n.stat { padding: 18px 4px 18px 22px; border-left: 3px solid var(--azul-gov); }\n.stat:nth-child(2){ border-left-color: var(--verde-gov); }\n.stat:nth-child(3){ border-left-color: var(--amarelo-gov); }\n.stat:nth-child(4){ border-left-color: var(--azul-gov); }\n.stat .snum {\n  font-size: 44px; font-weight: 800; letter-spacing: -0.03em; line-height: 1;\n  color: var(--azul-gov);\n}\n.stat:nth-child(2) .snum { color: var(--verde-gov); }\n.stat:nth-child(3) .snum { color: #C79A00; }\n.stat .slbl { font-size: 13.5px; color: var(--text-muted); line-height: 1.35; margin-top: 8px; max-width: 18ch; }\n\n/* horizontal pipeline */\n.pipe { display: flex; align-items: stretch; gap: 6px; }\n.pipe-node {\n  flex: 1; display: flex; flex-direction: column; gap: 9px;\n  padding: 16px 14px; border-radius: 11px; background: var(--card);\n  border: 1px solid var(--line); box-shadow: var(--shadow-sm);\n}\n.pipe-node.src { background: var(--subtle); border-style: dashed; box-shadow: none; }\n.pipe-node.sink { background: rgba(19,81,180,0.06); border-color: rgba(19,81,180,0.28); }\n.pipe-node .ph { display: flex; align-items: center; gap: 10px; }\n.pipe-node .pname { font-size: 14.5px; font-weight: 700; line-height: 1.15; }\n.pipe-node .pmeta { font-family: var(- ine);\n}\n.minitag.blue { background: rgba(19,81,180,0.08); color: var(--azul-gov); border-color: rgba(19,81,180,0.18); }\n.minitag.green { background: rgba(22,136,33,0.10); color: var(--verde-gov); border-color: rgba(22,136,33,0.2); }\n\n.bd-table { display: flex; flex-direction: column; align-self: start; }\n.bd-table .bdh { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 11px; }\n.bd-row {\n  display: grid; grid-template-columns: 1fr; gap: 2px;\n  padding: 11px 14px; border-radius: 9px; border: 1px solid var(--line);\n  background: var(--card); margin-bottom: 8px;\n}\n.bd-row .bdtop { display: flex; align-items: baseline; gap: 9px; }\n.bd-row .bdname { font-size: 14.5px; font-weight: 700; }\n.bd-row .bdtech { font-family: var(--font-mono); font-size: 11px; color: var(--azul-gov); margin-left: auto; }\n.bd-row .bdwhat { font-size: 12.5px; color: var(--text-muted); }\n\n/* before / after strip */\n.transform { display: grid; grid-template-columns: 1fr 38px 1.25fr; align-items: stretch; gap: 0; margin-top: 2px; }\n.tcard { padding: 14px 16px; border-radius: 10px; display: flex; flex-direction: column; gap: 7px; }\n.tcard.before { background: var(--subtle); border: 1px dashed var(--line-strong); }\n.tcard.after { background: var(--card); border: 1.5px solid var(--azul-gov); box-shadow: var(--shadow-sm); }\n.tcard .tlbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }\n.tcard.after .tlbl { color: var(--azul-gov); }\n.tcard .traw { font-size: 12.5px; color: var(--text-muted); line-height: 1.4; }\n.tcard .tfields { display: flex; flex-wrap: wrap; gap: 6px; }\n.tchip { font-family: var(--font-mono); font-size: 11px; padding: 3px 8px; border-radius: 5px; }\n.tchip.tema { background: rgba(19,81,180,0.10); color: var(--azul-gov); }\n.tchip.sent { background: rgba(22,136,33,0.12); color: var(--verde-gov); }\n.tchip.ent { background: rgba(255,205,7,0.22); color: #8A6D00; }\n.t-arrow { display: grid; place-items: center; color: var(--azul-gov); }\n.t-arrow svg { width: 22px; height: 22px; }\n\n/* slide 3 rebuild — hero antes/depois + camadas complementares */\n.transform-hero { display: grid; grid-template-columns: 1fr 50px 1.4fr; align-items: stretch; gap: 0; }\n.transform-hero .tcard { padding: 20px 24px; gap: 11px; border-radius: 13px; justify-content: center; }\n.transform-hero .tcard.after { border-width: 2px; }\n.transform-hero .tlbl { font-size: 11px; }\n.transform-hero .traw { font-size: 15px; line-height: 1.55; }\n.transform-hero .tfields { gap: 8px; }\n.transform-hero .tchip { font-size: 12.5px; padding: 5px 10px; }\n.transform-hero .t-arrow svg { width: 28px; height: 28px; }\n\n.db-section { display: flex; flex-direction: column; gap: 13px; }\n.db-head {\n  display: flex; align-items: baseline; gap: 12px;\n}\n.db-head::before { content: \"\"; align-self: center; width: 22px; height: 2px; background: var(--azul-gov); flex-shrink: 0; }\n.db-title {\n  font-size: 19px; font-weight: 800; letter-spacing: -0.01em; color: var(--azul-gov);\n}\n.db-sub {\n  font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em;\n  text-transform: uppercase; color: var(--text-muted);\n}\n.db-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }\n.db-card {\n  display: flex; flex-direction: column; gap: 6px; padding: 16px 17px;\n  border-radius: 12px; background: var(--card); border: 1px solid var(--line);\n  box-shadow: var(--shadow-sm); border-top: 3px solid var(--azul-gov);\n}\n.db-card:nth-child(2) { border-top-color: var(--verde-gov); }\n.db-card:nth-child(3) { border-top-color: var(--amarelo-gov); }\n.db-card:nth-child(4) { border-top-color: var(--azul-gov); }\n.db-card .dbuse {\n  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em;\n  text-transform: uppercase; color: var(--azul-gov); font-weight: 500;\n}\n.db-card:nth-child(2) .dbuse { color: var(--verde-gov); }\n.db-card:nth-child(3) .dbuse { color: #A6790A; }\n.db-card .dbname { font-size: 16px; font-weight: 700; line-height: 1.1; }\n.db-card .dbtech { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }\n.db-card .dbadv { font-size: 12.5px; color: #34405A; line-height: 1.45; margin-top: 3px; }\n.db-card .dblist { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }\n.db-card .dblist li {\n  display: flex; gap: 8px; font-size: 12.5px; color: #34405A; line-height: 1.35;\n}\n.db-card .dblist li::before {\n  content: \"\"; flex-shrink: 0; margin-top: 6px; width: 5px; height: 5px;\n  border-radius: 2px; background: var(--azul-gov);\n}\n.db-card:nth-child(2) .dblist li::before { background: var(--verde-gov); }\n.db-card:nth-child(3) .dblist li::before { background: var(--amarelo-gov); }\n\n/* ============================================================\n   SLIDE 4 — FERRAMENTAS (3 produtos)\n   ============================================================ */\n.products { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--gap); flex: 1; min-height: 0; }\n.product {\n  display: flex; flex-direction: column; gap: 13px;\n  padding: 22px 22px 20px; border-radius: 13px; background: var(--card);\n  border: 1px solid var(--line); box-shadow: var(--shadow-sm);\n  border-top: 4px solid var(--azul-gov);\n}\n.product.green { border-top-color: var(--verde-gov); }\n.product.amber { border-top-color: var(--amarelo-gov); }\n.product .phead { display: flex; align-items: center; gap: 12px; }\n.product .plabel { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--azul-gov); }\n.product.green .plabel { color: var(--verde-gov); }\n.product.amber .plabel { color: #A6790A; }\n.product h3 { font-size: 21px; font-weight: 800; letter-spacing: -0.02em; }\n.product .feats { display: flex; flex-direction: column; gap: 9px; flex: 1; }\n.product .feats li { d ma Nacional de Imunizações no Amazonas, em parceria com o governo estadual, com foco nas comunidades ribeirinhas…\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-arrow\"><svg viewBox=\"0 0 24 24\"><use href=\"#ic-arrow-r\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"tcard after\">\n          <div class=\"tlbl\">Depois — dado estruturado e consultável<\u002Fdiv>\n          <div class=\"tfields\">\n            <span class=\"tchip tema\">tema: Saúde › Imunização<\u002Fspan>\n            <span class=\"tchip sent\">sentimento: positivo<\u002Fspan>\n            <span class=\"tchip ent\">ORG: Ministério da Saúde<\u002Fspan>\n            <span class=\"tchip ent\">POLICY: Programa Nacional de Imunizações<\u002Fspan>\n            <span class=\"tchip ent\">LOC: Amazonas<\u002Fspan>\n            <span class=\"tchip tema\">embedding 768-dim<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- DB layers: complementaridade -->\n      <div class=\"db-section fade d2\">\n        <div class=\"db-head\"><span class=\"db-title\">Datalake<\u002Fspan><span class=\"db-sub\">um dado, todos os usos — cada camada serve a um propósito complementar<\u002Fspan><\u002Fdiv>\n        <div class=\"db-grid\">\n          <div class=\"db-card\">\n            <div class=\"dbuse\">Operar<\u002Fdiv>\n            <div class=\"dbname\">Silver · OLTP<\u002Fdiv>\n            <div class=\"dbtech\">PostgreSQL 15 + pgvector<\u002Fdiv>\n            <ul class=\"dblist\">\n              <li>Dados operacionais ao vivo<\u002Fli>\n              <li>RAG para respostas de IA<\u002Fli>\n              <li>Leitura e escrita em tempo real<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"db-card\">\n            <div class=\"dbuse\">Buscar<\u002Fdiv>\n            <div class=\"dbname\">Busca<\u002Fdiv>\n            <div class=\"dbtech\">Typesense<\u002Fdiv>\n            <ul class=\"dblist\">\n              <li>Full-text + vetorial<\u002Fli>\n              <li>Latência &lt;100ms<\u002Fli>\n              <li>Resultados relevantes ao usuário<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"db-card\">\n            <div class=\"dbuse\">Analisar<\u002Fdiv>\n            <div class=\"dbname\">Gold · OLAP<\u002Fdiv>\n            <div class=\"dbtech\">BigQuery<\u002Fdiv>\n            <ul class=\"dblist\">\n              <li>Métricas históricas<\u002Fli>\n              <li>Dashboards e BI<\u002Fli>\n              <li>Análise em escala<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"db-card\">\n            <div class=\"dbuse\">Relacionar<\u002Fdiv>\n            <div class=\"dbname\">Grafo<\u002Fdiv>\n            <div class=\"dbtech\">PostgreSQL · estrutura de grafo<\u002Fdiv>\n            <ul class=\"dblist\">\n              <li>Redes de co-menção<\u002Fli>\n              <li>Conexões entre entidades<\u002Fli>\n              <li>Órgãos, pessoas e políticas<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 4 — FERRAMENTAS ============ -->\n  <section class=\"slide\" data-label=\"Ferramentas e serviços\">\n    <div class=\"slide-head fade\">\n      <span class=\"section-tag\">03 · Ferramentas para as ASCOMs<\u002Fspan>\n      <h2 class=\"headline\">Da difusão à análise: ferramentas para <span class=\"hl\">ampliar o alcance dos órgãos<\u002Fspan> e gerar inteligência para as ASCOMs<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"slide-body\" style=\"padding-top:10px;\">\n      <div class=\"products\">\n        <div class=\"product fade d1\">\n          <div class=\"phead\">\n            <span class=\"ibub\"><svg viewBox=\"0 0 24 24\"><use href=\"#ic-megaphone\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n            <div><div class=\"plabel\">Difusão<\u002Fdiv><h3>Web Difusora<\u002Fh3><\u002Fdiv>\n          <\u002Fdiv>\n          <ul class=\"feats\">\n            <li><span>Widget de notícias <b>embeddável<\u002Fb> — lista, grid 2/3 col, carrossel<\u002Fspan><\u002Fli>\n            <li><span>Notificações <b>WebPush<\u002Fb> para cidadãos (1 clique)<\u002Fspan><\u002Fli>\n            <li><span>Feeds <b>RSS / Atom / JSON<\u002Fb> com filtros dinâmicos<\u002Fspan><\u002Fli>\n            <li><span>Busca semântica integrável no portal<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <p class=\"quote\">\"O portal do órgão mantém sua identidade. O DGB amplifica seu alcance.\"<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"product green fade d2\">\n          <div class=\"phead\">\n            <span class=\"ibub green\"><svg viewBox=\"0 0 24 24\"><use href=\"#ic-clip\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n            <div><div class=\"plabel\">Inteligência editorial<\u002Fdiv><h3>Clipping<\u002Fh3><\u002Fdiv>\n          <\u002Fdiv>\n          <ul class=\"feats\">\n            <li><span>Define recortes por <b>tema, órgão ou palavra-chave<\u002Fb><\u002Fspan><\u002Fli>\n            <li><span>IA gera <b>resumo editorial<\u002Fb> — não só lista de links<\u002Fspan><\u002Fli>\n            <li><span>Entrega: <b>Email · Telegram · WebPush · Webhook<\u002Fb><\u002Fspan><\u002Fli>\n            <li><span>Histórico de edições com digest + artigos<\u002Fspan><\u002Fli>\n            <li><span>Marketplace público: publicar, seguir e clonar<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <p class=\"quote\">\"Seu briefing matinal sobre o governo, com análise de IA.\"<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"product amber fade d3\">\n          <div class=\"phead\">\n            <span class=\"ibub amber\"><svg viewBox=\"0 0 24 24\"><use href=\"#ic-bars\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n            <div><div class=\"plabel\">BI comunicacional<\u002Fdiv><h3>Panorama Gov.BR<\u002Fh3><\u002Fdiv>\n          <\u002Fdiv>\n          <ul class=\"feats\">\n            <li><span>KPIs: <b>volume, temas ativos, órgãos, média diária<\u002Fb><\u002Fspan><\u002Fli>\n            <li><span>Tendências temáticas emergentes (janelas comparadas)<\u002Fspan><\u002Fli>\n            <li><span>Rankings por tema e órgão<\u002Fspan><\u002Fli>\n            <li><span>Análise por órgão: cobertura, sentimento, timeline<\u002Fspan><\u002Fli>\n            <li><span><b>1ª versão de BI<\u002Fb> para a comunicação governamental<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <p class=\"quote\">\"O que o governo está comunicando — por tema, órgão e tempo.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 5 — INTEROPERABILIDADE (dark) ============ -->\n  <section class=\"slide dark\" data-label=\"Camada de Interoperabilidade\">\n    <div class=\"slide-head fade\">\n      <span class=\"section-tag\">04 · Camada de Interoperabilidade<\u002Fspan>\n      <h2 class=\"headline\">A inteligência do DGB, <span class=\"hl\">consumível por outras plataformas e por pessoas<\u002Fspan> — fatos atualizados dentro de cada fluxo de trabalho<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"slide-body\" style=\"padding-top:6px; gap:16px;\">\n      <div class=\"interop-access fade d1\">\n        <span class=\"ia-label\">Acesso programável<\u002Fspan>\n        <span class=\"ia-chips\"><code>GraphQL API<\u002Fcode><code>MCP Server<\u002Fcode><\u002Fspan>\n        <span class=\"badge live\"><span class=\"dot\"><\u002Fspan>MCP em piloto<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"caps fade d2\">\n        <div class=\"cap\">\n          <div class=\"ach\"><span class=\"ibub\"><svg viewBox=\"0 0 24 24\"><use href=\"#ic-plug\"><\u002Fuse><\u002Fsvg><\u002Fspan><h4>Plataformas que conversam com o DGB<\u002Fh4><\u002Fdiv>\n          <p>Outros sistemas de governo passam a recuperar <b>fatos e evidências atualizados<\u002Fb> dentro dos seus próprios fluxos.<\u002Fp>\n          <p class=\"cap-ex\"><b>Ex.:<\u002Fb> um chatbot do Enem responde citando notícias recentes da cidade do estudante.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cap\">\n          <div class=\"ach\"><span class=\"ibub\"><svg viewBox=\"0 0 24 24\"><use href=\"#ic-ai\"><\u002Fuse><\u002Fsvg><\u002Fspan><h4>Agentes de IA que analisam por você<\u002Fh4><\u002Fdiv>\n          <p>Via MCP, agentes <b>executam análises e geram relatórios<\u002Fb> automaticamente — inclusive para usuários não técnicos.<\u002Fp>\n          <p class=\"cap-ex\"><b>Demo:<\u002Fb> MCP rodando no Claude Desktop.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cap\">\n          <div class=\"ach\"><span class=\"ibub\"><svg viewBox=\"0 0 24 24\"><use href=\"#ic-chat\"><\u002Fuse><\u002Fsvg><\u002Fspan><h4>Chat conversacional no portal<\u002Fh4><\u002Fdiv>\n          <p>A mesma experiência conversacional, <b>nativa no portal<\u002Fb> do DGB — sem precisar de ferramentas externas.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ucband fade d3\">\n        <div class=\"uc-head\">10 casos de uso já mapeados para o MCP <span>— o que se pode pedir, em linguagem natural<\u002Fspan><\u002Fdiv>\n        <div class=\"uc-grid\">\n          <div class=\"uc\"><span class=\"ucn\">01<\u002Fspan><div class=\"ucx\"><div class=\"uct\">Briefing diário da agência<\u002Fdiv><div class=\"ucp\">assessoria de comunicação<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"uc\"><span class=\"ucn\">04<\u002Fspan><div class=\"ucx\"><div class=\"uct\">Radar de tendências emergentes<\u002Fdiv><div class=\"ucp\">assessoria estratégica<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"uc\"><span class=\"ucn\">05<\u002Fspan><div class=\"ucx\"><div class=\"uct\">Geração assistida de release<\u002Fdiv><div class=\"ucp\">redação<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"uc\"><span class=\"ucn\">03<\u002Fspan><div class=\"ucx\"><div class=\"uct\">Trajetória de uma entidade<\u002Fdiv><div class=\"ucp\">pesquisa · imprensa<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n
